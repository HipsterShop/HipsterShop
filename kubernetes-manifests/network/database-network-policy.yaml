apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-policy
  namespace: hipster-database
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow from backend (services → MongoDB)
  - from:
    - namespaceSelector:
        matchLabels:
          name: hipster-backend
    ports:
    - protocol: TCP
      port: 27017

  # Allow internal DB communication (replica set)
  - from:
    - podSelector: {}

  egress:
  # Allow internal DB communication
  - to:
    - podSelector: {}

  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
