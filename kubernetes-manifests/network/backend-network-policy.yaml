apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: hipster-backend
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow from frontend (UI → gateway)
  - from:
    - namespaceSelector:
        matchLabels:
          name: hipster-frontend

  # Allow internal backend communication
  - from:
    - podSelector: {}

  egress:
  # Allow to frontend (gateway → frontend UI)
  - to:
    - namespaceSelector:
        matchLabels:
          name: hipster-frontend
    ports:
    - protocol: TCP
      port: 8080

  # Allow to database (services → MongoDB)
  - to:
    - namespaceSelector:
        matchLabels:
          name: hipster-database
    ports:
    - protocol: TCP
      port: 27017

  # Allow internal backend communication
  - to:
    - podSelector: {}

  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
