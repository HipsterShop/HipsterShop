apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: hipster-frontend
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow from backend (gateway → frontend)
  - from:
    - namespaceSelector:
        matchLabels:
          name: hipster-backend
    ports:
    - protocol: TCP
      port: 8080

  # Allow internal frontend communication
  - from:
    - podSelector: {}

  egress:
  # Allow to backend (frontend → APIs)
  - to:
    - namespaceSelector:
        matchLabels:
          name: hipster-backend

  # Allow internal frontend communication
  - to:
    - podSelector: {}

  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
