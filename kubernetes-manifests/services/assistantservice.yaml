apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistantservice
  namespace: hipster
spec:
  selector:
    matchLabels:
      app: assistantservice
  template:
    metadata:
      labels:
        app: assistantservice
    spec:
      containers:
      - name: server
        image: cazzzzz/trf-assistantservice-hipster:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: GATEWAY_ADDR
          value: "hipstershop-gateway.hipster.svc.cluster.local:80"
        - name: GEMINI_MODEL
          value: "gemini-2.5-flash"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api
              key: GEMINI_API_KEY
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /_healthz
            port: 8080
        livenessProbe:
          httpGet:
            path: /_healthz
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: assistantservice
  namespace: hipster
spec:
  type: ClusterIP
  selector:
    app: assistantservice
  ports:
  - name: http
    port: 8080
    targetPort: 8080
