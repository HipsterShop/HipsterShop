# ═══════════════════════════════════════════════════════════════════════════
#  HipsterShop — Umbrella Chart Values
#  Single source of truth for all 16 sub-charts.
#
#  Sub-charts read from the global: block automatically via Helm's
#  global value propagation mechanism — no per-chart overrides needed.
#
#  Per-chart enable/disable toggles live at the bottom under charts:
#  Usage:
#    # Install everything (default)
#    helm upgrade --install hipstershop ./Helm
#
#    # Disable a specific chart
#    helm upgrade --install hipstershop ./Helm \
#      --set charts.loadgenerator.enabled=false
#
#    # Disable an entire tier with tags
#    helm upgrade --install hipstershop ./Helm \
#      --set tags.backend=false
# ═══════════════════════════════════════════════════════════════════════════

global:

  # ── Namespace Isolation ──────────────────────────────────────────────────
  # Three isolated namespaces — each has its own NetworkPolicy.
  namespaces:
    frontend: hipster-frontend
    backend:  hipster-backend
    database: hipster-database

  # ── Container Images ─────────────────────────────────────────────────────
  # Override any image tag here without touching templates.
  images:
    adservice:             cazzzzz/trf-adservice-hipster:latest
    assistantservice:      cazzzzz/trf-assistantservice-hipster:latest
    authservice:           cazzzzz/trf-authservice-hipster:latest
    cartservice:           cazzzzz/trf-cartservice-hipster:v1
    checkoutservice:       cazzzzz/trf-checkoutservice-hipster:latest
    currencyservice:       cazzzzz/trf-currencyservice-hipster:latest
    emailservice:          cazzzzz/trf-emailservice-hipster:latest
    frontend:              cazzzzz/trf-frontend-hipster:v2
    paymentservice:        cazzzzz/trf-paymentservice-hipster:latest
    productcatalogservice: cazzzzz/trf-productcatalogservice-hipster:v1
    recommendationservice: cazzzzz/trf-recommendationservice-hipster:latest
    shippingservice:       cazzzzz/trf-shippingservice-hipster:latest
    mongodb:               mongo:7.0
    loadgenerator:         busybox:1.28

  # ── Replica Counts ────────────────────────────────────────────────────────
  replicas:
    adservice:             2
    assistantservice:      2
    authservice:           2
    cartservice:           2
    checkoutservice:       2
    currencyservice:       2
    emailservice:          2
    frontend:              2
    paymentservice:        2
    productcatalogservice: 2
    recommendationservice: 2
    shippingservice:       2
    loadgenerator:         3

  # ── Rolling Update Strategy ───────────────────────────────────────────────
  rollingUpdate:
    maxUnavailable: 1
    maxSurge:       1

  # ── Service Ports ────────────────────────────────────────────────────────
  ports:
    adservice:             9555
    authservice:           8081
    cartservice:           7070
    checkoutservice:       5050
    currencyservice:       7000
    emailservice:          8080
    frontend:              8080
    frontendSvc:           80
    paymentservice:        50051
    productcatalogservice: 3550
    recommendationservice: 8080
    shippingservice:       50051
    assistantservice:      8080

  # ── Secrets ──────────────────────────────────────────────────────────────
  # Replace geminiApiKey with a real key before deploying.
  secrets:
    jwtSecret:    "team4hipstershopsecret"
    geminiApiKey: "REPLACE_WITH_GEMINI_API_KEY"

  # ── MongoDB StatefulSet ───────────────────────────────────────────────────
  mongodb:
    replicas:       3
    storageClass:   nfs
    storageSize:    5Gi
    replicaSetName: rs0
    initDatabase:   shopdb
    rootUsername:   admin
    rootPassword:   mongopassword
    # Per-service MongoDB users and databases
    users:
      auth:
        username: auth_user
        password: auth_password
        database: auth_db
      cart:
        username: cart_user
        password: cart_password
        database: cart_db
      catalog:
        username: catalog_user
        password: catalog_password
        database: catalog_db
      order:
        username: order_user
        password: order_password
        database: order_db
      payment:
        username: payment_user
        password: payment_password
        database: payment_db
      notification:
        username: notification_user
        password: notification_password
        database: notification_db
      analytics:
        username: analytics_user
        password: analytics_password
        database: analytics_db

  # ── Application Configuration ─────────────────────────────────────────────
  appConfig:
    enableTracing:        "1"
    collectorServiceAddr: "jaeger:4317"
    frontendMessage:      "Checkout HipsterShop today!"
    enableAssistant:      "true"

  # ── Feature Flags ─────────────────────────────────────────────────────────
  features:
    currencyServiceRandomError:    "1"
    paymentServiceDisableProfiler: "1"
    productCatalogSeedDatabase:    "true"
    geminiModel:                   "gemini-2.5-flash"

  # ── MongoDB Collection / Database Names ───────────────────────────────────
  mongodbConfig:
    replicaSet:                         rs0
    catalogProductsCollection:          products
    orderOrdersCollection:              orders
    orderEventsCollection:              order_events
    paymentChargesCollection:           charges
    analyticsRecommendationsCollection: recommendations
    notificationEmailEventsCollection:  email_events

  # ── Gateway ───────────────────────────────────────────────────────────────
  gateway:
    name:             hipstershop-gateway
    gatewayClassName: kgateway
    port:             80

  # ── Network Policy ────────────────────────────────────────────────────────
  # Controls ingress CIDR for the HAProxy reverse-proxy and the kgateway
  # control-plane namespace. Update vpcCidr to a /32 for a single host.
  networkPolicy:
    vpcCidr:           "172.31.0.0/16"
    kgatewayNamespace: "kgateway-system"

  # ── Horizontal Pod Autoscaler ─────────────────────────────────────────────
  hpa:
    frontend:
      minReplicas:       2
      maxReplicas:       5
      cpuUtilization:    70
      memoryUtilization: 80
      scaleDown:
        stabilizationWindowSeconds: 20
        percentValue:               50
        periodSeconds:              15
      scaleUp:
        stabilizationWindowSeconds: 5
        percentValue:               100
        podsValue:                  2
        periodSeconds:              15

  # ── Resource Requests & Limits ────────────────────────────────────────────
  resources:
    standard:
      requests:
        cpu:    100m
        memory: 64Mi
      limits:
        cpu:    200m
        memory: 128Mi
    recommendation:
      requests:
        cpu:    100m
        memory: 220Mi
      limits:
        cpu:    200m
        memory: 450Mi
    adservice:
      requests:
        cpu:    200m
        memory: 180Mi
      limits:
        cpu:    300m
        memory: 512Mi
    cartservice:
      requests:
        cpu:    200m
        memory: 256Mi
      limits:
        cpu:    300m
        memory: 512Mi
    mongodb:
      requests:
        cpu:    200m
        memory: 256Mi
      limits:
        cpu:    500m
        memory: 512Mi

# ═══════════════════════════════════════════════════════════════════════════
#  Per-chart Enable / Disable Toggles
#  ─────────────────────────────────
#  Set any chart's enabled flag to false to skip it during install/upgrade.
#  These map directly to the `condition:` fields in Chart.yaml.
#
#  Examples:
#    --set charts.loadgenerator.enabled=false   # skip load generator
#    --set charts.assistantservice.enabled=false # skip Gemini assistant
#
#  Tag-level toggles (disable an entire tier):
#    --set tags.backend=false       # skip all backend microservices
#    --set tags.frontend=false      # skip frontend + loadgenerator
#    --set tags.infrastructure=false # skip backend-common + mongodb
#    --set tags.gateway=false       # skip gateway + routes
# ═══════════════════════════════════════════════════════════════════════════

charts:

  # ── Infrastructure tier ──────────────────────────────────────────────────
  backend-common:
    enabled: true   # Namespaces, ConfigMaps, Secrets, backend NetworkPolicy

  mongodb:
    enabled: true   # StatefulSet (3-replica rs0), init/seed Jobs, DB NetworkPolicy

  # ── Frontend tier ────────────────────────────────────────────────────────
  frontend:
    enabled: true   # Deployment, Service, HPA, ConfigMaps, frontend NetworkPolicy

  loadgenerator:
    enabled: true   # Synthetic traffic generator (disable in production)

  # ── Gateway tier ─────────────────────────────────────────────────────────
  gateway:
    enabled: true   # GatewayClass, Gateway, all HTTPRoutes

  # ── Backend microservices ─────────────────────────────────────────────────
  adservice:
    enabled: true

  assistantservice:
    enabled: true   # Requires a valid geminiApiKey in global.secrets

  authservice:
    enabled: true

  cartservice:
    enabled: true

  checkoutservice:
    enabled: true

  currencyservice:
    enabled: true

  emailservice:
    enabled: true

  paymentservice:
    enabled: true

  productcatalogservice:
    enabled: true

  recommendationservice:
    enabled: true

  shippingservice:
    enabled: true
